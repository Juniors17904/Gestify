<link rel="stylesheet" href="../../css/style.css">
<link rel="stylesheet" href="../../css/dashboard.css">

<div style="padding:16px;max-width:440px;margin:0 auto">

  <!-- Tabs vistas -->
  <div style="display:flex;gap:6px;margin-bottom:16px">
    <button onclick="setVista(1)" id="tab1" style="flex:1;padding:8px;border-radius:10px;border:none;background:var(--primary);color:white;font-size:12px;font-weight:700;cursor:pointer">Vista 1</button>
    <button onclick="setVista(2)" id="tab2" style="flex:1;padding:8px;border-radius:10px;border:1.5px solid #E2E8F0;background:white;color:#64748B;font-size:12px;font-weight:700;cursor:pointer">Vista 2</button>
    <button onclick="setVista(3)" id="tab3" style="flex:1;padding:8px;border-radius:10px;border:1.5px solid #E2E8F0;background:white;color:#64748B;font-size:12px;font-weight:700;cursor:pointer">Vista 3</button>
  </div>

  <!-- VISTA 1: Card compacta con botón grande -->
  <div id="vista1" class="card" style="margin-bottom:16px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px">
    <div style="width:56px;height:56px;border-radius:16px;background:#FFF7ED;display:flex;align-items:center;justify-content:center">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    </div>
    <div style="text-align:center">
      <div style="font-size:16px;font-weight:800;color:#1E293B">Nueva Venta</div>
      <div style="font-size:12px;color:#94A3B8;margin-top:2px">Registra una venta rápidamente</div>
    </div>
    <button onclick="alert('POS')" style="width:100%;padding:13px;border-radius:12px;border:none;background:var(--primary);color:white;font-size:15px;font-weight:800;cursor:pointer">+ Nueva Venta</button>
  </div>

  <!-- VISTA 2: Banner horizontal -->
  <div id="vista2" style="display:none;margin-bottom:16px;border-radius:16px;background:linear-gradient(135deg,#F97316,#FB923C);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px">
    <div>
      <div style="font-size:16px;font-weight:800;color:white">Registrar Venta</div>
      <div style="font-size:12px;color:rgba(255,255,255,.75);margin-top:2px">Toca para comenzar</div>
    </div>
    <button onclick="alert('POS')" style="padding:11px 18px;border-radius:12px;border:none;background:white;color:var(--primary);font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap">+ Nueva</button>
  </div>

  <!-- VISTA 3: Row tipo acción rápida -->
  <div id="vista3" style="display:none;margin-bottom:16px">
    <div style="font-size:10px;font-weight:700;color:#94A3B8;letter-spacing:.6px;margin-bottom:8px">ACCIONES RÁPIDAS</div>
    <div class="card" style="padding:0;overflow:hidden">
      <button onclick="alert('POS')" style="width:100%;display:flex;align-items:center;gap:14px;padding:16px;border:none;background:white;cursor:pointer;text-align:left">
        <div style="width:42px;height:42px;border-radius:12px;background:#FFF7ED;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        </div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700;color:#1E293B">Nueva Venta</div>
          <div style="font-size:12px;color:#94A3B8">Abre el punto de venta</div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

  <!-- Card Inventario -->
  <div class="card" style="padding:0;overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--gray-100)">
      <h3 style="font-size:15px;font-weight:700;margin:0">Inventario</h3>
      <button onclick="abrirModalPrueba()"
        style="padding:7px 14px;border-radius:10px;border:none;background:var(--primary);color:white;font-size:13px;font-weight:600;cursor:pointer">
        + Agregar producto
      </button>
    </div>
    <div style="padding:16px;color:var(--gray-400);font-size:13px;text-align:center">
      Sin productos aún.
    </div>
  </div>

</div>

<script>
  function abrirModalPrueba() {
    let modal = document.getElementById('modalPruebaProd');
    if (!modal) {
      modal = document.createElement('div');
      modal.id = 'modalPruebaProd';
      modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box';
      modal.onclick = function(e) { if (e.target === modal) cerrarModalPrueba(); };
      modal.innerHTML = `
        <div style="background:white;border-radius:20px;padding:24px 20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
            <h3 style="font-size:17px;font-weight:700;margin:0">Agregar Producto</h3>
            <button onclick="cerrarModalPrueba()" style="width:32px;height:32px;border-radius:50%;border:none;background:#F1F5F9;font-size:16px;cursor:pointer;color:#64748B">✕</button>
          </div>

          <p style="font-size:10px;font-weight:700;letter-spacing:.8px;color:#94A3B8;margin:0 0 10px">INFORMACIÓN</p>
          <div class="form-group">
            <input type="text" id="prodNombre" placeholder="Nombre *">
          </div>
          <div class="form-group">
            <input type="text" id="prodSku" placeholder="Código / SKU (opcional)">
          </div>
          <div class="form-group">
            <input type="text" id="prodCategoria" placeholder="Categoría (opcional)">
          </div>
          <div class="form-group">
            <input type="text" id="prodProveedor" placeholder="Proveedor (opcional)">
          </div>

          <p style="font-size:10px;font-weight:700;letter-spacing:.8px;color:#94A3B8;margin:16px 0 10px">PRECIOS</p>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="form-group">
              <input type="number" id="prodPrecio" placeholder="Precio venta (S/) *" min="0" step="0.01">
            </div>
            <div class="form-group">
              <input type="number" id="prodCosto" placeholder="Precio costo (S/)" min="0" step="0.01">
            </div>
          </div>

          <p style="font-size:10px;font-weight:700;letter-spacing:.8px;color:#94A3B8;margin:16px 0 10px">STOCK</p>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="form-group">
              <input type="number" id="prodStock" placeholder="Stock inicial *" min="0">
            </div>
            <div class="form-group">
              <input type="number" id="prodStockMinimo" placeholder="Stock mínimo" min="0">
            </div>
          </div>
          <div class="form-group">
            <input type="text" id="prodUnidad" placeholder="Unidad (unidad, kg, metro, litro...)">
          </div>

          <div style="display:flex;gap:10px;margin-top:16px">
            <button onclick="cerrarModalPrueba()" style="flex:1;padding:12px;border-radius:12px;border:1px solid #E2E8F0;background:white;font-size:14px;font-weight:600;color:#64748B;cursor:pointer">Cancelar</button>
            <button style="flex:1;padding:12px;border-radius:12px;border:none;background:var(--primary);color:white;font-size:14px;font-weight:700;cursor:pointer">Guardar</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
    } else {
      modal.style.display = 'flex';
    }
  }

  function cerrarModalPrueba() {
    const modal = document.getElementById('modalPruebaProd');
    if (modal) modal.style.display = 'none';
  }

  function setVista(n) {
    [1,2,3].forEach(i => {
      const v = document.getElementById('vista'+i);
      const t = document.getElementById('tab'+i);
      const activo = i === n;
      if (v) v.style.display = activo ? (i===2 ? 'flex' : 'block') : 'none';
      if (t) { t.style.background = activo ? 'var(--primary)' : 'white'; t.style.color = activo ? 'white' : '#64748B'; t.style.border = activo ? 'none' : '1.5px solid #E2E8F0'; }
    });
  }
</script>
