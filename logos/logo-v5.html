<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestify - Logo v5</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; gap: 40px; flex-wrap: wrap; }
    .preview { display: flex; flex-direction: column; align-items: center; gap: 12px; background: white; padding: 30px; border-radius: 16px; }
    p { font-size: 11px; color: #94A3B8; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
  </style>
</head>
<body>

  <!-- Sobre blanco -->
  <div class="preview">
    <p>Fondo blanco</p>
    <svg width="220" height="240" viewBox="0 0 220 240" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8B83FF"/><stop offset="100%" stop-color="#4A43CC"/></linearGradient>
        <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7B73FF"/><stop offset="100%" stop-color="#3A33BB"/></linearGradient>
        <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6C63FF"/><stop offset="100%" stop-color="#4A43CC"/></linearGradient>
        <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9B93FF"/><stop offset="100%" stop-color="#5A53DD"/></linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#4A43CC" flood-opacity="0.3"/>
        </filter>
        <marker id="arrowW" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><polygon points="0,0 10,5 0,10" fill="white"/></marker>
        <marker id="arrowP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><polygon points="0,0 10,5 0,10" fill="#6C63FF"/></marker>
      </defs>


      <!-- Barras (de izq a der, creciendo, superan la flecha) -->
      <rect x="42" y="130" width="22" height="50" rx="4" fill="url(#bar1)" filter="url(#shadow)"/>
      <rect x="70" y="100" width="22" height="80" rx="4" fill="url(#bar2)" filter="url(#shadow)"/>
      <rect x="98" y="62" width="22" height="118" rx="4" fill="url(#bar3)" filter="url(#shadow)"/>
      <rect x="126" y="82" width="22" height="98" rx="4" fill="url(#bar4)" filter="url(#shadow)"/>
      <rect x="154" y="48" width="22" height="132" rx="4" fill="url(#bar1)" filter="url(#shadow)"/>

      <!-- Línea de tendencia + flecha (por encima de las barras) -->
      <polyline points="53,128 81,98 109,60 137,80 165,44" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="53,128 81,98 109,60 137,80 165,44" stroke="#6C63FF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Cabeza de flecha -->
      <polygon points="171,36 157,43 168,51" fill="white"/>
      <polygon points="171,36 158,44 167,50" fill="#6C63FF"/>
      <!-- Línea base -->
      <line x1="35" y1="188" x2="185" y2="188" stroke="#6C63FF" stroke-width="3" stroke-linecap="round"/>

      <!-- Texto -->
      <text x="110" y="212" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="22" font-weight="800" fill="#6C63FF" letter-spacing="3">GESTIFY</text>
      <text x="110" y="230" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#94A3B8" letter-spacing="2">TU NEGOCIO BAJO CONTROL</text>
    </svg>
  </div>

  <!-- Sobre morado -->
  <div class="preview" style="background:#6C63FF">
    <p style="color:rgba(255,255,255,0.5)">Fondo morado</p>
    <svg width="220" height="240" viewBox="0 0 220 240" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bar1b" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="rgba(255,255,255,0.6)"/></linearGradient>
        <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.3)"/>
        </filter>
      </defs>


      <rect x="42" y="130" width="22" height="50" rx="4" fill="url(#bar1b)" stroke="rgba(255,255,255,0.4)" stroke-width="1" filter="url(#shadow2)"/>
      <rect x="70" y="100" width="22" height="80" rx="4" fill="url(#bar1b)" stroke="rgba(255,255,255,0.4)" stroke-width="1" filter="url(#shadow2)"/>
      <rect x="98" y="62" width="22" height="118" rx="4" fill="url(#bar1b)" stroke="rgba(255,255,255,0.4)" stroke-width="1" filter="url(#shadow2)"/>
      <rect x="126" y="82" width="22" height="98" rx="4" fill="url(#bar1b)" stroke="rgba(255,255,255,0.4)" stroke-width="1" filter="url(#shadow2)"/>
      <rect x="154" y="48" width="22" height="132" rx="4" fill="url(#bar1b)" stroke="rgba(255,255,255,0.4)" stroke-width="1" filter="url(#shadow2)"/>

      <polyline points="53,128 81,98 109,60 137,80 165,44" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="53,128 81,98 109,60 137,80 165,44" stroke="#6C63FF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <polygon points="171,36 157,43 168,51" fill="white"/>
      <polygon points="171,36 158,44 167,50" fill="#6C63FF"/>
      <!-- Línea base -->
      <line x1="35" y1="188" x2="185" y2="188" stroke="white" stroke-width="3" stroke-linecap="round"/>

      <text x="110" y="212" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="22" font-weight="800" fill="white" letter-spacing="3">GESTIFY</text>
      <text x="110" y="230" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.6)" letter-spacing="2">TU NEGOCIO BAJO CONTROL</text>
    </svg>
  </div>

</body>
</html>
