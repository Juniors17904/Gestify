<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestify - Logo Horizontal v2</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
  </style>
</head>
<body>
  <div style="background:white;border-radius:20px;padding:30px 40px;display:flex;flex-direction:column;align-items:center;gap:16px">

    <div style="display:inline-flex;align-items:flex-start;gap:0">
      <svg width="100" height="139" viewBox="0 0 140 195" fill="none" xmlns="http://www.w3.org/2000/svg" style="position:relative;z-index:1;flex-shrink:0">
        <defs>
          <linearGradient id="bgPH2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8B83FF"/><stop offset="100%" stop-color="#4A43CC"/></linearGradient>
          <linearGradient id="bPH2" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="rgba(255,255,255,0.5)"/><stop offset="100%" stop-color="white"/></linearGradient>
          <marker id="apH2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4" markerHeight="4" orient="auto"><polygon points="0,0 10,5 0,10" fill="white"/></marker>
        </defs>
        <rect x="22" y="10" width="96" height="168" rx="20" fill="url(#bgPH2)"/>
        <rect x="30" y="30" width="80" height="122" rx="6" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
        <circle cx="70" cy="20" r="5" fill="white" opacity="0.9"/>
        <rect x="55" y="162" width="30" height="8" rx="4" fill="white" opacity="0.9"/>
        <rect x="34" y="118" width="16" height="32" rx="2" fill="url(#bPH2)"/>
        <rect x="53" y="69"  width="16" height="81" rx="2" fill="url(#bPH2)"/>
        <rect x="72" y="46"  width="16" height="104" rx="2" fill="url(#bPH2)"/>
        <rect x="91" y="76"  width="16" height="74" rx="2" fill="url(#bPH2)"/>
        <polyline points="42,118 61,69 80,46 99,76 107,50" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#apH2)"/>
      </svg>
      <span style="border:2px solid #6C63FF;border-left:none;border-radius:0 14px 14px 0;display:flex;align-items:center;justify-content:center;height:91px;margin-top:21px;margin-left:-32px;position:relative;z-index:0;padding:0 39px 0 36px;font-size:51px;font-weight:700;color:#1E1B4B;letter-spacing:1px;font-family:'Libre Baskerville',serif">GESTIFY</span>
    </div>
  </div>
</body>
</html>
