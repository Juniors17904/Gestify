<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6C63FF" />
    <title>Gestify</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="icons/icon-192.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100dvh;
        background: #5A52D5;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* HEADER */
      .login-header {
        width: 100%;
        background: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 24px 0px;
        gap: 0;
      }

      .login-header canvas {
        width: 330px;
        height: auto;
      }

      .login-header h1 {
        color: #6c63ff;
        font-size: 28px;
        font-weight: 800;
        margin: 0;
        letter-spacing: -0.5px;
      }

      .login-header p {
        color: #94a3b8;
        font-size: 13px;
        margin: 0;
        text-align: center;
      }

      /* CARD BLANCA */
      .login-card {
        width: 100%;
        background: white;
        border-radius: 0;
        padding: 20px 24px 36px;
      }

      /* Tabs */
      .auth-tabs {
        margin-bottom: 24px;
      }

      @media (min-width: 480px) {
        body {
          justify-content: center;
          background: #6C63FF;
        }

        .login-header {
          background: white;
          border-radius: 20px 20px 0 0;
          max-width: 480px;
          padding: 40px 32px 32px;
        }

        .login-card {
          border-radius: 0 0 20px 20px;
          min-height: auto;
          box-shadow: 0 12px 48px rgba(0, 0, 0, 0.12);
        }
      }
    </style>
  </head>
  <body>
    <div style="width:calc(100% - 32px);max-width:400px;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3)">

    <!-- HEADER -->
    <div class="login-header" style="background:white;padding:36px 24px 20px">
      <svg width="220" height="240" viewBox="0 0 220 240" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8B83FF"/><stop offset="100%" stop-color="#4A43CC"/></linearGradient>
          <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7B73FF"/><stop offset="100%" stop-color="#3A33BB"/></linearGradient>
          <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6C63FF"/><stop offset="100%" stop-color="#4A43CC"/></linearGradient>
          <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9B93FF"/><stop offset="100%" stop-color="#5A53DD"/></linearGradient>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#4A43CC" flood-opacity="0.3"/>
          </filter>
        </defs>
        <rect x="42" y="130" width="22" height="50" rx="4" fill="url(#bar1)" filter="url(#shadow)"/>
        <rect x="70" y="100" width="22" height="80" rx="4" fill="url(#bar2)" filter="url(#shadow)"/>
        <rect x="98" y="62" width="22" height="118" rx="4" fill="url(#bar3)" filter="url(#shadow)"/>
        <rect x="126" y="82" width="22" height="98" rx="4" fill="url(#bar4)" filter="url(#shadow)"/>
        <rect x="154" y="48" width="22" height="132" rx="4" fill="url(#bar1)" filter="url(#shadow)"/>
        <polyline points="53,128 81,98 109,60 137,80 165,44" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="53,128 81,98 109,60 137,80 165,44" stroke="#6C63FF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <polygon points="171,36 157,43 168,51" fill="white"/>
        <polygon points="171,36 158,44 167,50" fill="#6C63FF"/>
        <line x1="35" y1="188" x2="185" y2="188" stroke="#6C63FF" stroke-width="3" stroke-linecap="round"/>
        <text x="110" y="212" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="22" font-weight="800" fill="#6C63FF" letter-spacing="3">GESTIFY</text>
        <text x="110" y="230" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#94A3B8" letter-spacing="2">TU NEGOCIO BAJO CONTROL</text>
      </svg>
    </div>

    <!-- CARD FORMULARIO -->
    <div class="login-card">
      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" onclick="showTab('login')">
          Iniciar Sesión
        </button>
        <button class="tab-btn" onclick="showTab('register')">
          Registrarse
        </button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input
            type="email"
            id="loginEmail"
            placeholder="correo@ejemplo.com"
            required
          />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <div class="input-password">
            <input
              type="password"
              id="loginPassword"
              placeholder="Tu contraseña"
              required
            />
            <button
              type="button"
              class="toggle-pwd"
              onclick="togglePwd('loginPassword', this)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">
          <span>Iniciar Sesión</span>
        </button>
        <p class="forgot-link">
          <a href="#" onclick="showForgot()">¿Olvidaste tu contraseña?</a>
        </p>
      </form>

      <!-- Register Form -->
      <form
        id="registerForm"
        class="auth-form hidden"
        onsubmit="handleRegister(event)"
      >
        <div class="form-group">
          <label>Nombre del negocio</label>
          <input
            type="text"
            id="regBusiness"
            placeholder="Ej: Bodega San Juan"
            required
          />
        </div>
        <div class="form-group">
          <label>Tu nombre</label>
          <input
            type="text"
            id="regName"
            placeholder="Tu nombre completo"
            required
          />
        </div>
        <div class="form-group">
          <label>Tipo de negocio</label>
          <select id="regTipo" required>
            <option value="">Selecciona...</option>
            <option value="bodega">Bodega / Abarrotes</option>
            <option value="farmacia">Farmacia / Botica</option>
            <option value="restaurante">Restaurante / Comida</option>
            <option value="ropa">Tienda de Ropa</option>
            <option value="electronica">Electrónica / Celulares</option>
            <option value="ferreteria">Ferretería</option>
            <option value="panaderia">Panadería / Pastelería</option>
            <option value="salon">Salón / Peluquería</option>
            <option value="otro">Otro</option>
          </select>
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input
            type="email"
            id="regEmail"
            placeholder="correo@ejemplo.com"
            required
          />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <div class="input-password">
            <input
              type="password"
              id="regPassword"
              placeholder="Mínimo 6 caracteres"
              required
              minlength="6"
            />
            <button
              type="button"
              class="toggle-pwd"
              onclick="togglePwd('regPassword', this)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="registerBtn">
          <span>Crear Cuenta</span>
        </button>
      </form>


      <div id="authMessage" class="auth-message hidden"></div>
    </div>

    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pwa.js"></script>
  </body>
</html>
