<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6C63FF" />
    <title>Gestify</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="icons/icon-192.png" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100dvh;
        background: #5A52D5;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* HEADER */
      .login-header {
        width: 100%;
        background: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 24px 0px;
        gap: 0;
      }

      .login-header canvas {
        width: 330px;
        height: auto;
      }

      .login-header h1 {
        color: #6c63ff;
        font-size: 28px;
        font-weight: 800;
        margin: 0;
        letter-spacing: -0.5px;
      }

      .login-header p {
        color: #94a3b8;
        font-size: 13px;
        margin: 0;
        text-align: center;
      }

      /* CARD BLANCA */
      .login-card {
        width: 100%;
        background: white;
        border-radius: 0;
        padding: 20px 24px 36px;
      }

      /* Tabs */
      .auth-tabs {
        margin-bottom: 24px;
      }

      @media (min-width: 480px) {
        body {
          justify-content: center;
          background: #6C63FF;
        }

        .login-header {
          background: white;
          border-radius: 20px 20px 0 0;
          max-width: 480px;
          padding: 40px 32px 32px;
        }

        .login-card {
          border-radius: 0 0 20px 20px;
          min-height: auto;
          box-shadow: 0 12px 48px rgba(0, 0, 0, 0.12);
        }
      }
    </style>
  </head>
  <body>
    <div style="width:calc(100% - 32px);max-width:400px;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3)">

    <!-- HEADER -->
    <div class="login-header" style="background:white;padding:36px 24px 20px">
      <div
        style="
          width: 330px;
          position: relative;
          overflow: hidden;
          height: 148px;
        "
      >
        <canvas id="logoCanvas" style="width: 330px; height: auto"></canvas>
      </div>
      <h1 style="margin:10px 0 4px;font-size:26px;font-weight:800;color:#6C63FF;letter-spacing:1px">GESTIFY</h1>
    <p style="margin:0;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#94A3B8">Bienvenido</p>
    </div>

    <!-- CARD FORMULARIO -->
    <div class="login-card">
      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" onclick="showTab('login')">
          Iniciar Sesión
        </button>
        <button class="tab-btn" onclick="showTab('register')">
          Registrarse
        </button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input
            type="email"
            id="loginEmail"
            placeholder="correo@ejemplo.com"
            required
          />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <div class="input-password">
            <input
              type="password"
              id="loginPassword"
              placeholder="Tu contraseña"
              required
            />
            <button
              type="button"
              class="toggle-pwd"
              onclick="togglePwd('loginPassword', this)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">
          <span>Iniciar Sesión</span>
        </button>
        <p class="forgot-link">
          <a href="#" onclick="showForgot()">¿Olvidaste tu contraseña?</a>
        </p>
      </form>

      <!-- Register Form -->
      <form
        id="registerForm"
        class="auth-form hidden"
        onsubmit="handleRegister(event)"
      >
        <div class="form-group">
          <label>Nombre del negocio</label>
          <input
            type="text"
            id="regBusiness"
            placeholder="Ej: Bodega San Juan"
            required
          />
        </div>
        <div class="form-group">
          <label>Tu nombre</label>
          <input
            type="text"
            id="regName"
            placeholder="Tu nombre completo"
            required
          />
        </div>
        <div class="form-group">
          <label>Tipo de negocio</label>
          <select id="regTipo" required>
            <option value="">Selecciona...</option>
            <option value="bodega">Bodega / Abarrotes</option>
            <option value="farmacia">Farmacia / Botica</option>
            <option value="restaurante">Restaurante / Comida</option>
            <option value="ropa">Tienda de Ropa</option>
            <option value="electronica">Electrónica / Celulares</option>
            <option value="ferreteria">Ferretería</option>
            <option value="panaderia">Panadería / Pastelería</option>
            <option value="salon">Salón / Peluquería</option>
            <option value="otro">Otro</option>
          </select>
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input
            type="email"
            id="regEmail"
            placeholder="correo@ejemplo.com"
            required
          />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <div class="input-password">
            <input
              type="password"
              id="regPassword"
              placeholder="Mínimo 6 caracteres"
              required
              minlength="6"
            />
            <button
              type="button"
              class="toggle-pwd"
              onclick="togglePwd('regPassword', this)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="registerBtn">
          <span>Crear Cuenta</span>
        </button>
      </form>


      <div id="authMessage" class="auth-message hidden"></div>
    </div>

    </div>

    <script>
      const img = new Image();
      img.src = "logos/LOGOv3.png";
      img.onload = function () {
        const canvas = document.getElementById("logoCanvas");
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < data.data.length; i += 4) {
          const r = data.data[i],
            g = data.data[i + 1],
            b = data.data[i + 2];
          if (r < 40 && g < 40 && b < 40) {
            data.data[i + 3] = 0;
          } else if (r > 200 && g > 200 && b > 200) {
            data.data[i] = 108;
            data.data[i + 1] = 99;
            data.data[i + 2] = 255;
          }
        }
        ctx.putImageData(data, 0, 0);
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pwa.js"></script>
  </body>
</html>
