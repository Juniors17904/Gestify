<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6C63FF" />
    <title>Gestify</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="icons/icon-192.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100dvh;
        background: #5A52D5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow-y: auto;
      }

      .auth-wrap {
        width: calc(100% - 32px);
        max-width: 400px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      }

      /* LOGO */
      .login-header {
        background: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 32px 24px 16px;
      }

      /* CARD */
      .login-card {
        background: white;
        padding: 8px 24px 32px;
      }

      /* ---- METHOD SELECTOR ---- */
      .auth-title {
        font-size: 22px;
        font-weight: 700;
        color: #1E293B;
        text-align: center;
        margin: 0 0 6px;
      }
      .auth-subtitle {
        font-size: 13px;
        color: #94A3B8;
        text-align: center;
        margin: 0 0 28px;
      }

      .method-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 28px;
      }

      .btn-method {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 20px;
        border: 1.5px solid #E2E8F0;
        border-radius: 12px;
        background: white;
        font-size: 15px;
        font-weight: 500;
        color: #1E293B;
        cursor: pointer;
        transition: border-color .2s, background .2s;
      }
      .btn-method:hover { border-color: #6C63FF; background: #F8F7FF; }
      .btn-method svg { flex-shrink: 0; }

      .auth-switch {
        text-align: center;
        font-size: 14px;
        color: #64748B;
        margin: 0;
      }
      .auth-switch a {
        color: #6C63FF;
        font-weight: 600;
        text-decoration: none;
        margin-left: 4px;
      }

      /* ---- FORM VIEW ---- */
      .btn-back {
        display: flex;
        align-items: center;
        gap: 6px;
        background: none;
        border: none;
        color: #6C63FF;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        padding: 4px 0 16px;
      }
      .btn-back:hover { opacity: .75; }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="auth-wrap">

      <!-- LOGO -->
      <div class="login-header">
        <svg width="200" height="220" viewBox="0 0 220 240" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8B83FF"/><stop offset="100%" stop-color="#4A43CC"/></linearGradient>
            <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7B73FF"/><stop offset="100%" stop-color="#3A33BB"/></linearGradient>
            <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6C63FF"/><stop offset="100%" stop-color="#4A43CC"/></linearGradient>
            <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9B93FF"/><stop offset="100%" stop-color="#5A53DD"/></linearGradient>
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#4A43CC" flood-opacity="0.3"/>
            </filter>
          </defs>
          <rect x="42" y="130" width="22" height="50" rx="4" fill="url(#bar1)" filter="url(#shadow)"/>
          <rect x="70" y="100" width="22" height="80" rx="4" fill="url(#bar2)" filter="url(#shadow)"/>
          <rect x="98" y="62" width="22" height="118" rx="4" fill="url(#bar3)" filter="url(#shadow)"/>
          <rect x="126" y="82" width="22" height="98" rx="4" fill="url(#bar4)" filter="url(#shadow)"/>
          <rect x="154" y="48" width="22" height="132" rx="4" fill="url(#bar1)" filter="url(#shadow)"/>
          <polyline points="53,128 81,98 109,60 137,80 165,44" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="53,128 81,98 109,60 137,80 165,44" stroke="#6C63FF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <polygon points="171,36 157,43 168,51" fill="white"/>
          <polygon points="171,36 158,44 167,50" fill="#6C63FF"/>
          <line x1="35" y1="188" x2="185" y2="188" stroke="#6C63FF" stroke-width="3" stroke-linecap="round"/>
          <text x="110" y="212" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="22" font-weight="800" fill="#6C63FF" letter-spacing="3">GESTIFY</text>
          <text x="110" y="230" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#94A3B8" letter-spacing="2">TU NEGOCIO BAJO CONTROL</text>
        </svg>
      </div>

      <!-- CARD -->
      <div class="login-card">

        <!-- ===== VIEW: SELECTOR DE MÉTODO ===== -->
        <div id="viewMethods">
          <h2 class="auth-title" id="authTitle">Regístrate en Gestify</h2>
          <p class="auth-subtitle" id="authSubtitle">Controla tu inventario, ventas y caja</p>

          <div class="method-list">
            <!-- Email -->
            <button class="btn-method" onclick="showEmailForm()">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6C63FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <span id="emailBtnText">Usar correo electrónico</span>
            </button>

            <!-- Google -->
            <button class="btn-method" onclick="handleGoogleLogin()">
              <svg width="22" height="22" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
              </svg>
              <span>Continuar con Google</span>
            </button>
          </div>

          <p class="auth-switch">
            <span id="switchText">¿Ya tienes una cuenta?</span>
            <a href="#" id="switchLink" onclick="toggleMode(); return false;">Iniciar sesión</a>
          </p>
        </div>

        <!-- ===== VIEW: FORMULARIO LOGIN ===== -->
        <div id="viewLoginForm" class="hidden">
          <button class="btn-back" onclick="showMethods()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Volver
          </button>
          <form onsubmit="handleLogin(event)">
            <div class="form-group">
              <label>Correo electrónico</label>
              <input type="email" id="loginEmail" placeholder="correo@ejemplo.com" autocomplete="email" required />
            </div>
            <div class="form-group">
              <label>Contraseña</label>
              <div class="input-password">
                <input type="password" id="loginPassword" placeholder="Tu contraseña" autocomplete="current-password" required />
                <button type="button" class="toggle-pwd" onclick="togglePwd('loginPassword', this)">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <button type="submit" class="btn-primary" id="loginBtn"><span>Iniciar Sesión</span></button>
            <p class="forgot-link"><a href="#" onclick="showForgot(); return false;">¿Olvidaste tu contraseña?</a></p>
          </form>
        </div>

        <!-- ===== VIEW: FORMULARIO REGISTRO ===== -->
        <div id="viewRegisterForm" class="hidden">
          <button class="btn-back" onclick="showMethods()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Volver
          </button>
          <form onsubmit="handleRegister(event)">
            <div class="form-group">
              <label>Nombre del negocio</label>
              <input type="text" id="regBusiness" placeholder="Ej: Bodega San Juan" autocomplete="organization" required />
            </div>
            <div class="form-group">
              <label>Tu nombre</label>
              <input type="text" id="regName" placeholder="Tu nombre completo" autocomplete="name" required />
            </div>
            <div class="form-group">
              <label>Tipo de negocio</label>
              <select id="regTipo" required>
                <option value="">Selecciona...</option>
                <option value="bodega">Bodega / Abarrotes</option>
                <option value="farmacia">Farmacia / Botica</option>
                <option value="restaurante">Restaurante / Comida</option>
                <option value="ropa">Tienda de Ropa</option>
                <option value="electronica">Electrónica / Celulares</option>
                <option value="ferreteria">Ferretería</option>
                <option value="panaderia">Panadería / Pastelería</option>
                <option value="salon">Salón / Peluquería</option>
                <option value="otro">Otro</option>
              </select>
            </div>
            <div class="form-group">
              <label>Correo electrónico</label>
              <input type="email" id="regEmail" placeholder="correo@ejemplo.com" autocomplete="email" required />
            </div>
            <div class="form-group">
              <label>Contraseña</label>
              <div class="input-password">
                <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required minlength="6" />
                <button type="button" class="toggle-pwd" onclick="togglePwd('regPassword', this)">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <button type="submit" class="btn-primary" id="registerBtn"><span>Crear Cuenta</span></button>
          </form>
        </div>

        <div id="authMessage" class="auth-message hidden"></div>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pwa.js"></script>
  </body>
</html>
