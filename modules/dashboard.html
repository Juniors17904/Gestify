<!-- Estado vacío cuando no hay negocio configurado -->
<div id="dashboardEmptyState" class="hidden" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1.5rem;text-align:center;padding:2rem;">
  <div style="width:72px;height:72px;background:var(--primary-light,#ede9fe);border-radius:50%;display:flex;align-items:center;justify-content:center;">
    <i data-lucide="building-2" style="width:36px;height:36px;color:var(--primary);"></i>
  </div>
  <div>
    <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:.5rem;">Configura tu negocio</h2>
    <p style="color:var(--text-secondary);font-size:.95rem;">Completa la configuración inicial para empezar a usar el sistema.</p>
  </div>
  <button class="btn-primary" onclick="mostrarSetup()" style="padding:.75rem 2rem;font-size:1rem;">Comenzar configuración</button>
</div>

<div id="dashboardContent" style="display:none">
  <div id="statsGrid" class="stats-grid"></div>
  <div id="dashboardGrid" class="dashboard-grid"></div>
</div>
