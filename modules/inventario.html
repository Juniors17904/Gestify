<!-- Stats -->
<div style="display:flex;gap:8px;margin-bottom:14px">
  <div class="card" style="flex:1;padding:12px;text-align:center"><div style="font-size:10px;color:var(--gray-400);font-weight:700;margin-bottom:2px">PRODUCTOS</div><div id="inv-stat-total" style="font-size:22px;font-weight:800;color:var(--primary)">—</div></div>
  <div class="card" style="flex:1;padding:12px;text-align:center"><div style="font-size:10px;color:var(--gray-400);font-weight:700;margin-bottom:2px">STOCK BAJO</div><div id="inv-stat-bajo" style="font-size:22px;font-weight:800;color:#F59E0B">—</div></div>
  <div class="card" style="flex:1;padding:12px;text-align:center"><div style="font-size:10px;color:var(--gray-400);font-weight:700;margin-bottom:2px">SIN STOCK</div><div id="inv-stat-cero" style="font-size:22px;font-weight:800;color:#EF4444">—</div></div>
</div>

<!-- Buscador -->
<input type="text" id="invBuscarInput" class="search-input" placeholder="Buscar producto..." oninput="buscarProducto(this.value)" style="width:100%;box-sizing:border-box;margin-bottom:8px">

<!-- Filtrar + Agregar -->
<div style="display:flex;gap:8px;margin-bottom:10px">
  <button id="invFiltrarBtn" onclick="toggleFiltroPanel()" style="flex:1;padding:10px 14px;border-radius:10px;border:1.5px solid #E2E8F0;background:white;font-size:13px;font-weight:600;color:#64748B;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
    Filtrar
    <span id="invFiltrarBadge" style="display:none;background:var(--primary);color:white;border-radius:20px;font-size:10px;font-weight:800;padding:1px 6px">0</span>
  </button>
  <button class="btn-primary" style="flex:1" onclick="loadCategorias().then(()=>showModal('modalProducto'))">+ Agregar</button>
</div>

<!-- Panel filtros -->
<div id="invFiltroPanel" style="display:none;background:white;border:1.5px solid #E2E8F0;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 4px 16px rgba(0,0,0,0.08)">
  <div id="filtrosCategorias"></div>
  <div id="filtrosProveedores"></div>
  <button onclick="limpiarFiltros()" style="margin-top:8px;width:100%;padding:8px;border:none;background:#F1F5F9;border-radius:8px;font-size:12px;font-weight:600;color:#64748B;cursor:pointer">Limpiar filtros</button>
</div>

<!-- Acordeón -->
<div id="invLista" style="display:flex;flex-direction:column;gap:6px">
  <div class="list-empty"><p>Sin productos aún</p></div>
</div>
